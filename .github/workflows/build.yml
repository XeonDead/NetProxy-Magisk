name: Build modules and notifications

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'src/module/**'
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      commit_count: ${{ steps.get_version.outputs.commit_count }}
    steps:
      - name: Pull Replace Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Update versionCode
        id: get_version
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          sed -i "s/^versionCode=.*/versionCode=$COMMIT_COUNT/" src/module/module.prop
          echo "versionCode Updated to: $COMMIT_COUNT"
          echo "commit_count=$COMMIT_COUNT" >> $GITHUB_OUTPUT

      - name: Upload construction products
        uses: actions/upload-artifact@v7
        with:
          name: NetProxy-Module
          path: src/module/

  notify:
    name: Organisation
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Download Build Product
        if: ${{ needs.build.result == 'success' }}
        uses: actions/download-artifact@v8
        with:
          name: NetProxy-Module
          path: src/module
      - name: Prepare Variables
        if: ${{ needs.build.result == 'success' }}
        run: |
          COMMIT_COUNT=${{ needs.build.outputs.commit_count }}
          VERSION=$(grep '^version=' src/module/module.prop | cut -d= -f2)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "COMMIT_COUNT=$COMMIT_COUNT" >> $GITHUB_ENV

      - name: Packing module
        if: ${{ needs.build.result == 'success' }}
        run: |
          # 1. Full Package (All Component)
          FULL_NAME="NetProxy_${{ env.VERSION }}_${{ env.COMMIT_COUNT }}.zip"
          echo "FULL_NAME=$FULL_NAME" >> $GITHUB_ENV
          cd src/module
          7z a -tzip -mx=9 "../../$FULL_NAME" .
          cd ../..

          # 2. Streamlining packages (Exclude IPSET Relevant documents)
          LITE_NAME="NetProxy_${{ env.VERSION }}_${{ env.COMMIT_COUNT }}_lite.zip"
          echo "LITE_NAME=$LITE_NAME" >> $GITHUB_ENV
          cd src/module
          7z a -tzip -mx=9 "../../$LITE_NAME" . -x!"bin/IPSET-LKM/*" -x!"bin/ipset"
          cd ../..

          # 3. Pure Script Package (Exclude all binary files)
          MINI_NAME="NetProxy_${{ env.VERSION }}_${{ env.COMMIT_COUNT }}_mini.zip"
          echo "MINI_NAME=$MINI_NAME" >> $GITHUB_ENV
          cd src/module
          7z a -tzip -mx=9 "../../$MINI_NAME" . -x!"bin/sing-box" -x!"bin/proxylink" -x!"bin/ipset" -x!"bin/IPSET-LKM/*" -x!"bin/zashboard/*"
          cd ../..

      - name: Send module to Telegram
        if: ${{ needs.build.result == 'success' }}
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          CAPTION="Module build successful notification
          
          Version: \`${{ env.VERSION }}\` (build ${{ env.COMMIT_COUNT }})
          Annotations:
          \`\`\`
          $COMMIT_MSG
          \`\`\`

          [Submission of records](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
          [Build Log](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

          # Send the complete package
          curl -s -F "chat_id=${{ secrets.TG_CHAT_ID }}" \
               -F "document=@${{ env.FULL_NAME }}" \
               -F "message_thread_id=2275" \
               -F "parse_mode=Markdown" \
               -F "caption=$CAPTION" \
               https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendDocument

          # Send streamline package
          curl -s -F "chat_id=${{ secrets.TG_CHAT_ID }}" \
               -F "document=@${{ env.LITE_NAME }}" \
               -F "message_thread_id=2275" \
               -F "caption=lite: Exclude IPSET Driver, applies to kernels already built-in IPSET Equipment" \
               https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendDocument

          # Send Pure Script Package
          curl -s -F "chat_id=${{ secrets.TG_CHAT_ID }}" \
               -F "document=@${{ env.MINI_NAME }}" \
               -F "message_thread_id=2275" \
               -F "caption=mini: Without binary files IPSET Drive, you have to put yourself in. sing-box、proxylink、zashboard Equal Component" \
               https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendDocument

      - name: Organisation
        if: ${{ needs.build.result == 'failure' }}
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        uses: cbrgm/telegram-github-action@v1
        with:
          token: ${{ secrets.TG_BOT_TOKEN }}
          to: ${{ secrets.TG_CHAT_ID }}
          thread-id: 2275
          parse-mode: markdown
          message: |
            Module build failure notification!
            
            Annotations:
            \`\`\`
            $COMMIT_MSG
            \`\`\`

            [Submission of records](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            [Build Log](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Release Announcements
        if: ${{ github.event_name == 'release' }}
        uses: cbrgm/telegram-github-action@v1
        with:
          token: ${{ secrets.TG_BOT_TOKEN }}
          to: ${{ secrets.TG_CHAT_ID }}
          thread-id: 2343
          parse-mode: markdown
          message: |
            New edition of the announcement!
            
            Version: `${{ github.event.release.tag_name }}`
            
            [View Update Log](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.event.release.tag_name }})
            
            [Download Module](${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.event.release.tag_name }}/NetProxy-Module.zip)
